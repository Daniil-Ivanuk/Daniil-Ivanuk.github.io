<!DOCTYPE html>
<html>
    <head>
        <title>Циклическое приветствие</title>
        <script>
            let clicks = 0;
            let phraseIndex = 0;
            const phrases = ["Доброе утро!", "Добрый день!", "Добрый вечер!"];
            
            function changeGreeting(buttonCl) {
                //меняем фразу циклически
                phraseIndex = (phraseIndex + 1) % phrases.length;
                document.querySelector("h1").innerText = phrases[phraseIndex];
                clicks++;
                //меняем текст кнопки
                buttonCl.innerText = "Кликов: " + clicks;
            }
        </script>
    </head>
    <body>
        <h1>Доброе утро!</h1>
        <button onClick="changeGreeting(this)">Кликов: 0</button>
    </body>
</html>
