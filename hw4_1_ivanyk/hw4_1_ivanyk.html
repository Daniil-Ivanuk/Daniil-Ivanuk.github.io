<!doctype html>
<html>
<head>
    <title>JS Tester</title>
    <style>
        .active {
            display: block !important;
        }
        .myText {
            display: none;
        }
        .title {
            font-size: 1.5em;
            background-color: #ddd;
        }
        
    </style>
    <script>
        // Здесь будет ваш код
        document.addEventListener('DOMContentLoaded', function() 
        {
            const titles = document.querySelectorAll('.title');
            const texts = document.querySelectorAll('.myText');
            //скрывает все тексты
            function hideAllTexts() 
            {
                texts.forEach(function(text) {
                    text.classList.remove('active');
                });
            }
            
            //перебираем все заголовки и добавляем обработчики
            for (let i = 0; i < titles.length; i++) 
            {
                titles[i].addEventListener('click', function() 
                {
                    //при клике сначала скрываем все тексты
                    hideAllTexts();
                    //показываем текст соответствующий текущему заголовку
                    texts[i].classList.add('active');
                });
            }
        });
    </script>
</head>
<body>
    <div class="container">
        <div class="title">Title #1</div>
        <div class="myText">Just some text #1</div>
        <div class="title">Title #2</div>
        <div class="myText">Just some text #2</div>
        <div class="title">Title #3</div>
        <div class="myText">Just some text #3</div>
    </div>
</body>
</html>
