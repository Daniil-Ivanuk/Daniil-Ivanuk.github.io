<!DOCTYPE html>
<html>
<head>
    <title>Click Me Game</title>
    <style>
        body {
            text-align: center;
        }
        
        .output {
            width: 500px;
            height: 500px;
            border: 1px solid black;
            margin: 20px auto 30px auto;
            position: relative;
            background-color: lightblue;
        }
        
        .box {
            width: 50px;
            height: 50px;
            position: absolute;
            background-color: red;
            display: none;
        }
        
        .message {
            text-align: center;
            padding: 10px;
            font-size: 1.3em;
            margin-bottom: 20px;
        }
        
        button {
            font-size: 18px;
            padding: 10px 20px;
            cursor: pointer;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            display: block;
            margin: 0 auto;
        }
        
        button:hover {
            background-color: darkgreen;
        }
    </style>
</head>
    
<body>
    <div class="output"></div>
    <div class="message"></div>

    <script>
        const output = document.querySelector('.output');
        const message = document.querySelector('.message');
        const box = document.createElement('div');
        box.classList.add('box');
        output.appendChild(box);
        const startBtn = document.createElement('button');
        startBtn.textContent = 'Начать игру';
        message.insertAdjacentElement('afterend', startBtn);
        message.innerHTML = 'Нажмите "Начать игру"';

        const game = {start: null};

        function getRandom(max) {return Math.random() * max;}
        
        function handleBoxClick() {
            const endTime = new Date().getTime();
            const reactionTime = (endTime - game.start) / 1000;
            message.innerHTML = `Ваше время: ${reactionTime.toFixed(3)} секунд! Нажмите "Начать игру" чтобы играть снова`;
            game.start = null;
            box.style.display = 'none';
        }
        
        function addBox() {
            message.innerHTML = 'Кликай быстро!';
            game.start = new Date().getTime();
            box.style.display = 'block';
            
            const maxWidth = 500 - 50;
            const maxHeight = 500 - 50;
            const randomLeft = getRandom(maxWidth);
            const randomTop = getRandom(maxHeight);
            
            box.style.left = randomLeft + 'px';
            box.style.top = randomTop + 'px';
        }

        function startGame() {
            message.innerHTML = 'Жди появление красного поля...';
            box.style.display = 'none';
            const delay = getRandom(2000) + 1000;
            setTimeout(addBox, delay);
        }
        
        startBtn.onclick = startGame;
        box.onclick = handleBoxClick;
    </script>
</body>
</html>
